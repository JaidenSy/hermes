engram:
  name: "Engram"
  session_prefix: "engram"
  log_path: "/Users/raphael_the_great-sage/engram/logs/engram.log"

# Telegram is the only supported trigger (see engram.py main()).
trigger:
  method: "telegram"

  telegram:
    # NOTE: token was migrated to keychain service "engram-telegram-bot"; the old
    # "engram-telegram-bot" entry is left as a harmless fallback.
    bot_token_keychain_service: "engram-telegram-bot"
    bot_token_keychain_account: "bot-token"
    chat_id: 8922766986
    trigger_prefix: "[ENGRAM]"
    poll_interval_seconds: 15

models:
  # ── Agent model routing (READ BY agent_runner.py — injected into task JSON,
  # consumed by run-agent.sh). Aliases (haiku/sonnet/opus/fable) always resolve
  # to the latest model of that tier via the claude CLI. Unavailable aliases are
  # auto-downgraded at startup by agent_runner.probe_models() (fable→opus→…).
  #
  # Routing philosophy:
  #   haiku  → mechanical steps (gather, polish, run a gh command)
  #   sonnet → the workhorse (writing code, writing tests, planning)
  #   opus   → judgment steps where a miss is expensive (review, architecture)
  #   fable  → tier-3 only: deepest reasoning for system design + final review
  agent_models:
    # Direct tasks (status checks / lookups — no pipeline).
    # sonnet, not haiku: the classifier sometimes routes real work here and haiku
    # bounces on anything non-trivial (e.g. asks for a URL and quits).
    direct:
      model: "sonnet"
      max_turns: 30

    # Per-role defaults (all tiers)
    roles:
      plan:      { model: "sonnet", max_turns: 25 }   # plan quality gates the whole run
      research:  { model: "haiku",  max_turns: 20 }
      architect: { model: "opus",   max_turns: 40 }
      coder:     { model: "sonnet", max_turns: 60 }
      tester:    { model: "sonnet", max_turns: 30 }
      cleanup:   { model: "haiku",  max_turns: 15 }
      review:    { model: "opus",   max_turns: 35 }   # highest-leverage catch point
      deployer:  { model: "haiku",  max_turns: 10 }

    # Per-tier overrides (tier 3 = architecture work → strongest models
    # on the steps that decide everything downstream)
    tier_overrides:
      1:
        coder:   { model: "sonnet", max_turns: 40 }   # hotfix — smaller scope
        tester:  { model: "haiku",  max_turns: 20 }
      3:
        plan:      { model: "opus",  max_turns: 30 }
        architect: { model: "fable", max_turns: 40 }
        review:    { model: "fable", max_turns: 35 }
